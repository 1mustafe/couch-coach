<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CouchCoach</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    'app-bg': '#0a0e14',
                    'app-surface': '#141a22',
                    'app-surfaceLight': '#1c2530',
                    'app-border': '#1e2a36',
                    'app-cyan': '#42d5e6',
                },
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                    display: ['Montserrat', 'sans-serif'],
                }
            }
        }
    }
</script>
<style>
    * { -webkit-tap-highlight-color: transparent; }
    body { overscroll-behavior: none; }
    .view-active { display: flex !important; }
    .view-hidden { display: none !important; }
    #poseCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #cam { transform: scaleX(-1); }
    #captureCanvas { display: none; }
    @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
    .pulse-ring { animation: pulse-ring 1.5s ease-out infinite; }
</style>
</head>
<body class="bg-app-bg font-sans text-white h-[100dvh] overflow-hidden">

<!-- ══════ PAIR SCREEN ══════ -->
<div id="pairScreen" class="view-active flex-col h-[100dvh] items-center justify-center px-8 text-center gap-8">
    <!-- Logo -->
    <div class="flex flex-col items-center">
        <span class="font-display font-black text-2xl tracking-tighter flex flex-col items-center leading-[0.9]">
            <span>Couch</span>
            <span class="text-app-cyan">Coach</span>
        </span>
    </div>

    <div class="flex flex-col items-center gap-3 mt-4">
        <h1 class="font-display text-2xl font-bold">Connect to your TV</h1>
        <p class="text-slate-400 text-sm max-w-[260px] leading-relaxed">Enter the 6-digit code shown on your Fire TV dashboard</p>
    </div>

    <!-- Code Inputs -->
    <div class="flex gap-2" id="codeRow">
        <input class="w-11 h-14 text-center bg-app-surface border border-app-border rounded-xl text-white font-display text-xl font-bold outline-none focus:border-app-cyan transition-colors" type="tel" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="w-11 h-14 text-center bg-app-surface border border-app-border rounded-xl text-white font-display text-xl font-bold outline-none focus:border-app-cyan transition-colors" type="tel" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="w-11 h-14 text-center bg-app-surface border border-app-border rounded-xl text-white font-display text-xl font-bold outline-none focus:border-app-cyan transition-colors" type="tel" maxlength="1" inputmode="numeric" autocomplete="off">
        <div class="w-3"></div>
        <input class="w-11 h-14 text-center bg-app-surface border border-app-border rounded-xl text-white font-display text-xl font-bold outline-none focus:border-app-cyan transition-colors" type="tel" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="w-11 h-14 text-center bg-app-surface border border-app-border rounded-xl text-white font-display text-xl font-bold outline-none focus:border-app-cyan transition-colors" type="tel" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="w-11 h-14 text-center bg-app-surface border border-app-border rounded-xl text-white font-display text-xl font-bold outline-none focus:border-app-cyan transition-colors" type="tel" maxlength="1" inputmode="numeric" autocomplete="off">
    </div>

    <p id="pErr" class="text-red-400 text-xs min-h-[16px]"></p>

    <button id="pBtn" disabled onclick="doPair()" class="w-full max-w-[300px] py-4 bg-app-cyan text-app-bg font-bold text-base rounded-full disabled:opacity-25 active:scale-[0.97] transition-all font-display tracking-wide">
        Connect
    </button>
</div>

<!-- ══════ WORKOUT SCREEN ══════ -->
<div id="wkScreen" class="view-hidden flex-col h-[100dvh]">
    <!-- Header -->
    <div class="flex items-center justify-between px-5 py-3 shrink-0">
        <span class="font-display font-black text-sm tracking-tighter flex items-center gap-1">
            <span>Couch</span><span class="text-app-cyan">Coach</span>
        </span>
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-app-cyan shadow-[0_0_6px_#42d5e6] animate-pulse"></div>
            <span id="wkStatus" class="text-slate-400 text-[10px] font-semibold tracking-wider uppercase">Loading...</span>
        </div>
    </div>

    <!-- Camera -->
    <div class="flex-1 relative overflow-hidden rounded-2xl mx-3">
        <video id="cam" class="w-full h-full object-cover rounded-2xl" autoplay playsinline muted></video>
        <canvas id="poseCanvas"></canvas>
        <canvas id="captureCanvas"></canvas>

        <!-- Silhouette Overlay -->
        <div id="silOverlay" class="absolute inset-0 flex items-end justify-center pb-6 pointer-events-none rounded-2xl">
            <div id="silMsg" class="bg-app-bg/85 backdrop-blur-xl border border-app-border rounded-xl px-5 py-3 text-sm font-medium text-slate-300 text-center max-w-[90%]">
                Position yourself in frame
            </div>
        </div>

        <!-- Feedback Toast -->
        <div id="toast" class="absolute top-4 left-3 right-3 bg-app-bg/90 backdrop-blur-xl border border-app-border rounded-2xl px-4 py-3 translate-y-[-130%] transition-transform duration-400 z-10" style="transition-timing-function: cubic-bezier(0.16,1,0.3,1)">
            <p id="toastT" class="text-sm font-semibold leading-snug"></p>
            <p id="toastM" class="text-[10px] text-slate-500 font-mono mt-1"></p>
        </div>

        <!-- Angle Badge -->
        <div id="angleBadge" class="absolute bottom-16 left-3 bg-app-bg/80 border border-app-border rounded-lg px-3 py-1.5 font-mono text-[11px] text-slate-400 hidden"></div>

        <!-- Loader -->
        <div id="loader" class="absolute inset-0 bg-app-bg/90 flex flex-col items-center justify-center gap-4 rounded-2xl z-20">
            <div class="w-7 h-7 border-3 border-app-border border-t-app-cyan rounded-full animate-spin"></div>
            <span class="text-slate-400 text-sm">Loading pose detection...</span>
        </div>
    </div>

    <!-- Controls -->
    <div class="px-5 py-4 flex flex-col gap-3 shrink-0">
        <!-- Stats -->
        <div class="flex justify-around py-2">
            <div class="text-center">
                <div id="reps" class="font-display text-2xl font-black">0</div>
                <div class="text-[9px] text-slate-500 font-bold tracking-widest uppercase mt-0.5">Reps</div>
            </div>
            <div class="text-center">
                <div id="score" class="font-display text-2xl font-black">—</div>
                <div class="text-[9px] text-slate-500 font-bold tracking-widest uppercase mt-0.5">Form</div>
            </div>
            <div class="text-center">
                <div id="timer" class="font-display text-2xl font-black">0:00</div>
                <div class="text-[9px] text-slate-500 font-bold tracking-widest uppercase mt-0.5">Time</div>
            </div>
        </div>

        <!-- Exercise Selector -->
        <div class="flex gap-2">
            <button onclick="pickEx(this)" data-e="pushup" class="ex-btn flex-1 py-2.5 bg-app-cyan/10 border border-app-cyan/30 rounded-xl text-app-cyan font-mono text-[11px] font-bold text-center">Pushup</button>
            <button onclick="pickEx(this)" data-e="squat" class="ex-btn flex-1 py-2.5 bg-app-surface border border-app-border rounded-xl text-slate-500 font-mono text-[11px] font-bold text-center">Squat</button>
            <button onclick="pickEx(this)" data-e="plank" class="ex-btn flex-1 py-2.5 bg-app-surface border border-app-border rounded-xl text-slate-500 font-mono text-[11px] font-bold text-center">Plank</button>
            <button onclick="pickEx(this)" data-e="lunge" class="ex-btn flex-1 py-2.5 bg-app-surface border border-app-border rounded-xl text-slate-500 font-mono text-[11px] font-bold text-center">Lunge</button>
        </div>

        <!-- Action Button -->
        <button id="actBtn" onclick="toggle()" class="w-full py-4 bg-app-cyan text-app-bg font-bold text-base rounded-full active:scale-[0.97] transition-all font-display tracking-wide">
            Start Workout
        </button>
    </div>
</div>

<script>

// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const API = location.origin;
let sid = null, ex = 'pushup', on = false, tmInt = null, t0 = 0;
let detector = null, rafId = null;
let repCount = 0, repPhase = 'up';
let bedrockBusy = false, lastPose = null;
let repData = { snapshots: [], issues: [], hadBadForm: false };
let lastFormCheckTime = 0;
let angleHistory = [];
let failedRepCooldown = 0;
let silLockStart = 0; // timestamp when all points first locked
let autoStarting = false;

const KP = {
    NOSE:0, L_EYE:1, R_EYE:2, L_EAR:3, R_EAR:4,
    L_SHOULDER:5, R_SHOULDER:6, L_ELBOW:7, R_ELBOW:8,
    L_WRIST:9, R_WRIST:10, L_HIP:11, R_HIP:12,
    L_KNEE:13, R_KNEE:14, L_ANKLE:15, R_ANKLE:16
};

const SKELETON = [
    [KP.L_SHOULDER, KP.R_SHOULDER],
    [KP.L_SHOULDER, KP.L_ELBOW], [KP.L_ELBOW, KP.L_WRIST],
    [KP.R_SHOULDER, KP.R_ELBOW], [KP.R_ELBOW, KP.R_WRIST],
    [KP.L_SHOULDER, KP.L_HIP], [KP.R_SHOULDER, KP.R_HIP],
    [KP.L_HIP, KP.R_HIP],
    [KP.L_HIP, KP.L_KNEE], [KP.L_KNEE, KP.L_ANKLE],
    [KP.R_HIP, KP.R_KNEE], [KP.R_KNEE, KP.R_ANKLE],
];

// Exercise configs: what angle to track, thresholds, form rules
const EX_CONFIG = {
    pushup: {
        trackJoint: 'l_elbow', downThresh: 100, upThresh: 150,
        // Body must be roughly horizontal for pushup to count
        positionValid: (p) => {
            // Shoulders and hips should be at similar Y height (horizontal body)
            // If shoulder_y is much less than hip_y, person is upright/standing
            if (p.l_shoulder_y && p.l_hip_y) {
                const diff = Math.abs(p.l_shoulder_y - p.l_hip_y);
                // In a pushup, shoulder and hip are within 20% of frame height
                // Standing: shoulder is way above hip (diff > 0.25)
                if (diff > 0.25) return false;
            }
            return true;
        },
        formChecks: (a, p) => {
            const issues = [];
            if (a.l_hip !== null && a.l_hip < 150) issues.push('hip_sag');
            if (a.l_hip !== null && a.l_hip > 185) issues.push('hip_pike');
            if (a.l_shoulder !== null && a.l_shoulder > 80) issues.push('elbows_flaring');
            if (a.l_elbow !== null && a.r_elbow !== null && Math.abs(a.l_elbow - a.r_elbow) > 20) issues.push('asymmetric_arms');
            return issues;
        },
        angleBadge: (a) => ({ val: a.l_elbow, label: 'Elbow' }),
    },
    squat: {
        trackJoint: 'l_knee', downThresh: 100, upThresh: 155,
        // Squats: person should be upright (shoulders above hips)
        positionValid: (p) => {
            if (p.l_shoulder_y && p.l_hip_y) {
                // Shoulders should be above hips (lower Y value)
                if (p.l_shoulder_y > p.l_hip_y) return false;
            }
            return true;
        },
        formChecks: (a, p) => {
            const issues = [];
            if (a.l_hip !== null && a.l_knee !== null && a.l_hip < 60 && a.l_knee < 110) issues.push('forward_lean');
            if (a.l_knee !== null && a.r_knee !== null && Math.abs(a.l_knee - a.r_knee) > 15) issues.push('asymmetric_knees');
            if (p.l_knee_x && p.r_knee_x && p.l_hip_x && p.r_hip_x) {
                const kw = Math.abs(p.l_knee_x - p.r_knee_x);
                const hw = Math.abs(p.l_hip_x - p.r_hip_x);
                if (kw < hw * 0.7) issues.push('knees_caving');
            }
            if (a.l_hip !== null && a.l_hip < 80 && (a.l_knee === null || a.l_knee > 130)) issues.push('torso_lean');
            return issues;
        },
        angleBadge: (a) => ({ val: a.l_knee, label: 'Knee' }),
    },
    lunge: {
        trackJoint: 'l_knee', downThresh: 100, upThresh: 155,
        positionValid: (p) => {
            if (p.l_shoulder_y && p.l_hip_y) {
                if (p.l_shoulder_y > p.l_hip_y) return false;
            }
            return true;
        },
        formChecks: (a, p) => {
            const issues = [];
            if (a.l_hip !== null && a.l_hip < 70) issues.push('torso_lean');
            if (a.l_knee !== null && a.r_knee !== null && Math.abs(a.l_knee - a.r_knee) > 30) issues.push('asymmetric_knees');
            if (p.l_knee_x && p.l_ankle_x) {
                if (Math.abs(p.l_knee_x - p.l_ankle_x) > 0.15) issues.push('knee_past_toes');
            }
            return issues;
        },
        angleBadge: (a) => ({ val: a.l_knee, label: 'Knee' }),
    },
    plank: {
        trackJoint: null, downThresh: 0, upThresh: 0,
        positionValid: (p) => {
            // Plank: body should be horizontal like pushup
            if (p.l_shoulder_y && p.l_hip_y) {
                const diff = Math.abs(p.l_shoulder_y - p.l_hip_y);
                if (diff > 0.25) return false;
            }
            return true;
        },
        formChecks: (a, p) => {
            const issues = [];
            if (a.l_hip !== null && a.l_hip < 150) issues.push('hip_sag');
            if (a.l_hip !== null && a.l_hip > 190) issues.push('hip_pike');
            if (a.l_shoulder !== null && (a.l_shoulder < 70 || a.l_shoulder > 110)) issues.push('shoulder_misalign');
            return issues;
        },
        angleBadge: (a) => ({ val: a.l_hip, label: 'Hip' }),
    },
};

// ══════════════════════════════════════
// PAIRING
// ══════════════════════════════════════
const cis = document.querySelectorAll('.ci');
cis.forEach((inp, i) => {
    inp.addEventListener('input', () => {
        inp.value = inp.value.replace(/\D/g, '');
        if (inp.value && i < 5) cis[i + 1].focus();
        document.getElementById('pBtn').disabled = [...cis].map(x => x.value).join('').length !== 6;
    });
    inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !inp.value && i > 0) cis[i - 1].focus();
    });
    inp.addEventListener('paste', e => {
        e.preventDefault();
        const txt = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
        txt.split('').forEach((ch, j) => { if (cis[j]) cis[j].value = ch });
        if (cis[Math.min(txt.length, 5)]) cis[Math.min(txt.length, 5)].focus();
        document.getElementById('pBtn').disabled = txt.length !== 6;
    });
});

async function doPair() {
    const code = [...cis].map(x => x.value).join('');
    const err = document.getElementById('pErr');
    err.textContent = '';
    try {
        const r = await fetch(API + '/api/session/pair', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code })
        });
        const d = await r.json();
        if (!r.ok) { err.textContent = 'Invalid code. Check your TV and try again.'; return; }
        sid = d.sessionId;
        goWorkout();
    } catch (e) { err.textContent = 'Cannot reach server. Same WiFi as your TV?'; }
}

// ══════════════════════════════════════
// WORKOUT INIT
// ══════════════════════════════════════
async function goWorkout() {
    document.getElementById('pairS').classList.remove('on');
    document.getElementById('wkS').classList.add('on');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
        });
        const vid = document.getElementById('cam');
        vid.srcObject = stream;
        await vid.play();
    } catch (e) { alert('Camera access is required'); return; }

    document.getElementById('wkStatus').textContent = 'Loading pose model…';
    try {
        await tf.setBackend('webgl');
        await tf.ready();
        detector = await poseDetection.createDetector(
            poseDetection.SupportedModels.MoveNet,
            { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
        );
        document.getElementById('loader').style.display = 'none';
        document.getElementById('wkStatus').textContent = 'Pose model ready';
        detectPose();
    } catch (e) {
        document.getElementById('loader').querySelector('.loader-txt').textContent = 'Pose model failed: ' + e.message;
    }
}

// ══════════════════════════════════════
// POSE DETECTION LOOP
// ══════════════════════════════════════
async function detectPose() {
    const vid = document.getElementById('cam');
    const canvas = document.getElementById('poseCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = vid.videoWidth || 640;
    canvas.height = vid.videoHeight || 480;

    if (detector && vid.readyState >= 2) {
        try {
            const poses = await detector.estimatePoses(vid);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);

            if (poses.length > 0 && poses[0].keypoints) {
                const kps = poses[0].keypoints;
                lastPose = kps;
                drawSkeleton(ctx, kps);
                drawKeypoints(ctx, kps);
                if (on) { processRep(kps); updateAngleBadge(kps); }
                updateSilhouette(kps);
            } else {
                lastPose = null;
                document.getElementById('silMsg').textContent = 'Step into frame';
                document.getElementById('silMsg').classList.remove('ready');
                document.getElementById('silOverlay').style.display = 'flex';
            }
            ctx.restore();
        } catch (e) { /* skip */ }
    }
    rafId = requestAnimationFrame(detectPose);
}

// ══════════════════════════════════════
// DRAWING
// ══════════════════════════════════════
function drawKeypoints(ctx, kps) {
    for (const kp of kps) {
        if (kp.score < 0.3) continue;
        ctx.beginPath();
        ctx.arc(kp.x, kp.y, 5, 0, 2 * Math.PI);
        ctx.fillStyle = kp.score > 0.5 ? '#4ade80' : '#facc15';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(kp.x, kp.y, 8, 0, 2 * Math.PI);
        ctx.strokeStyle = kp.score > 0.5 ? 'rgba(74,222,128,0.3)' : 'rgba(250,204,21,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}

function drawSkeleton(ctx, kps) {
    ctx.lineWidth = 3;
    for (const [i, j] of SKELETON) {
        const a = kps[i], b = kps[j];
        if (a.score < 0.3 || b.score < 0.3) continue;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = 'rgba(74,222,128,0.5)';
        ctx.stroke();
    }
}

// ══════════════════════════════════════
// SILHOUETTE CHECK
// ══════════════════════════════════════
function updateSilhouette(kps) {
    if (on) { document.getElementById('silOverlay').style.display = 'none'; return; }
    const overlay = document.getElementById('silOverlay');
    const msg = document.getElementById('silMsg');
    overlay.style.display = 'flex';
    const required = [KP.L_SHOULDER, KP.R_SHOULDER, KP.L_HIP, KP.R_HIP, KP.L_KNEE, KP.R_KNEE];
    const visible = required.filter(i => kps[i].score > 0.4).length;

    if (visible >= 5) {
        const now = Date.now();
        if (silLockStart === 0) silLockStart = now;
        const elapsed = (now - silLockStart) / 1000;
        const remaining = Math.ceil(3 - elapsed);

        if (elapsed >= 3 && !autoStarting) {
            // Auto-start the workout
            autoStarting = true;
            msg.textContent = '✓ Calibrated — starting workout';
            msg.classList.add('ready');
            setTimeout(() => { autoStarting = false; toggle(); }, 500);
        } else if (!autoStarting) {
            msg.textContent = remaining > 0
                ? 'Hold still — calibrating... ' + remaining + 's'
                : '✓ Locked in — starting...';
            msg.classList.add('ready');
        }
    } else {
        silLockStart = 0;
        autoStarting = false;
        msg.textContent = 'Move back so your full body is visible (' + visible + '/6 points)';
        msg.classList.remove('ready');
    }
}

// ══════════════════════════════════════
// MATH HELPERS
// ══════════════════════════════════════
function angle(a, b, c) {
    const rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let deg = Math.abs(rad * 180 / Math.PI);
    if (deg > 180) deg = 360 - deg;
    return deg;
}

function safeAngle(a, b, c) {
    if (!a || !b || !c || a.score < 0.3 || b.score < 0.3 || c.score < 0.3) return null;
    return Math.round(angle(a, b, c));
}

function computeAllAngles(kps) {
    return {
        l_elbow: safeAngle(kps[KP.L_SHOULDER], kps[KP.L_ELBOW], kps[KP.L_WRIST]),
        r_elbow: safeAngle(kps[KP.R_SHOULDER], kps[KP.R_ELBOW], kps[KP.R_WRIST]),
        l_shoulder: safeAngle(kps[KP.L_HIP], kps[KP.L_SHOULDER], kps[KP.L_ELBOW]),
        r_shoulder: safeAngle(kps[KP.R_HIP], kps[KP.R_SHOULDER], kps[KP.R_ELBOW]),
        l_hip: safeAngle(kps[KP.L_SHOULDER], kps[KP.L_HIP], kps[KP.L_KNEE]),
        r_hip: safeAngle(kps[KP.R_SHOULDER], kps[KP.R_HIP], kps[KP.R_KNEE]),
        l_knee: safeAngle(kps[KP.L_HIP], kps[KP.L_KNEE], kps[KP.L_ANKLE]),
        r_knee: safeAngle(kps[KP.R_HIP], kps[KP.R_KNEE], kps[KP.R_ANKLE]),
    };
}

function computePositions(kps, w, h) {
    const p = {};
    const map = { l_knee_x: [KP.L_KNEE,'x'], r_knee_x: [KP.R_KNEE,'x'],
        l_hip_x: [KP.L_HIP,'x'], r_hip_x: [KP.R_HIP,'x'],
        l_hip_y: [KP.L_HIP,'y'], r_hip_y: [KP.R_HIP,'y'],
        l_shoulder_y: [KP.L_SHOULDER,'y'], r_shoulder_y: [KP.R_SHOULDER,'y'],
        l_ankle_x: [KP.L_ANKLE,'x'], r_ankle_x: [KP.R_ANKLE,'x'],
        l_ankle_y: [KP.L_ANKLE,'y'], r_ankle_y: [KP.R_ANKLE,'y'],
        l_knee_y: [KP.L_KNEE,'y'], r_knee_y: [KP.R_KNEE,'y'] };
    for (const [k, [idx, axis]] of Object.entries(map)) {
        if (kps[idx].score > 0.3) p[k] = kps[idx][axis] / (axis === 'x' ? w : h);
    }
    return p;
}

function buildSnapshot(kps, angles, w, h) {
    const pos = {};
    const names = ['nose','l_eye','r_eye','l_ear','r_ear',
        'l_shoulder','r_shoulder','l_elbow','r_elbow','l_wrist','r_wrist',
        'l_hip','r_hip','l_knee','r_knee','l_ankle','r_ankle'];
    for (let i = 0; i < kps.length; i++) {
        if (kps[i].score > 0.3) pos[names[i]] = [+(kps[i].x / w).toFixed(3), +(kps[i].y / h).toFixed(3)];
    }
    return { positions: pos, angles: { ...angles } };
}

// ══════════════════════════════════════
// REP COUNTING + REAL-TIME FORM
// ══════════════════════════════════════
function processRep(kps) {
    const cfg = EX_CONFIG[ex];
    const w = document.getElementById('cam').videoWidth || 640;
    const h = document.getElementById('cam').videoHeight || 480;
    const now = Date.now();
    const angles = computeAllAngles(kps);
    const positions = computePositions(kps, w, h);

    // ── PLANK: no reps, continuous monitoring ──
    if (ex === 'plank') {
        if (now - lastFormCheckTime > 1500) {
            lastFormCheckTime = now;
            const issues = cfg.formChecks(angles, positions);
            if (issues.length > 0) {
                sendKeypointAnalysis({
                    exercise: ex, phase: 'hold',
                    current: buildSnapshot(kps, angles, w, h),
                    issues: issues
                });
            } else {
                showFB('Solid hold — keep it up! 💪', 'good');
                updScore('good');
                sendGoodRep();
            }
        }
        return;
    }

    // ── Exercises with reps ──
    const trackAngle = angles[cfg.trackJoint];
    if (trackAngle === null) return;

    // Check body position is valid for this exercise
    if (cfg.positionValid && !cfg.positionValid(positions)) {
        // Wrong body orientation — don't count anything
        if (repPhase === 'down') {
            // Was mid-rep but position became invalid
            showFB('Get into ' + ex + ' position', 'warning');
            updScore('warning');
        }
        return;
    }

    // Track angle history for failed rep detection
    angleHistory.push({ angle: trackAngle, time: now });
    if (angleHistory.length > 60) angleHistory.shift();

    // Continuous mid-rep form check every 300ms
    if (now - lastFormCheckTime > 300) {
        lastFormCheckTime = now;
        const snapshot = buildSnapshot(kps, angles, w, h);
        repData.snapshots.push(snapshot);
        if (repData.snapshots.length > 20) repData.snapshots.shift();

        const issues = cfg.formChecks(angles, positions);
        if (issues.length > 0) {
            repData.hadBadForm = true;
            repData.issues.push(...issues);
        }
    }

    // ── Rep phase detection ──
    if (repPhase === 'up' && trackAngle < cfg.downThresh) {
        repPhase = 'down';
    } else if (repPhase === 'down' && trackAngle > cfg.upThresh) {
        repPhase = 'up';
        repCount++;
        document.getElementById('reps').textContent = repCount;
        sendRepUpdate();
        angleHistory = [];
        failedRepCooldown = 0;

        if (repData.hadBadForm) {
            sendKeypointAnalysis({
                rep: repCount, exercise: ex,
                snapshots: repData.snapshots.slice(-6),
                issues_detected: [...new Set(repData.issues)],
            });
        } else {
            showFB('Good rep! 💪', 'good');
            updScore('good');
            sendGoodRep();
        }
        repData = { snapshots: [], issues: [], hadBadForm: false };
    }

    // ── Failed rep detection (insufficient depth) ──
    if (repPhase === 'up' && now - failedRepCooldown > 3000 && angleHistory.length > 15) {
        const recent = angleHistory.slice(-15).map(a => a.angle);
        const minAngle = Math.min(...recent);
        const currentAngle = recent[recent.length - 1];
        const startAngle = recent[0];

        // Started high, went down but not enough, came back up
        if (startAngle > cfg.upThresh - 10 && minAngle > cfg.downThresh && minAngle < cfg.downThresh + 30 && currentAngle > minAngle + 15) {
            failedRepCooldown = now;
            angleHistory = [];

            const jointName = cfg.trackJoint.includes('knee') ? 'knee' : 'elbow';
            showFB('Go deeper — ' + jointName + ' reached ' + Math.round(minAngle) + '°, need ' + cfg.downThresh + '°', 'warning');
            updScore('warning');

            sendKeypointAnalysis({
                exercise: ex, phase: 'failed_rep',
                min_angle_reached: Math.round(minAngle),
                threshold_needed: cfg.downThresh,
                snapshots: repData.snapshots.slice(-4),
                issues_detected: ['insufficient_depth'],
            });
            repData = { snapshots: [], issues: [], hadBadForm: false };
        }
    }
}

function updateAngleBadge(kps) {
    const badge = document.getElementById('angleBadge');
    if (!on) { badge.style.display = 'none'; return; }
    const cfg = EX_CONFIG[ex];
    const angles = computeAllAngles(kps);
    const info = cfg.angleBadge(angles);
    if (info.val !== null) {
        badge.style.display = 'block';
        badge.textContent = info.label + ': ' + Math.round(info.val) + '°';
        badge.style.color = info.val < 100 ? 'var(--g)' : info.val < 150 ? 'var(--y)' : 'var(--dm)';
    } else {
        badge.style.display = 'none';
    }
}

// ══════════════════════════════════════
// SERVER COMMUNICATION
// ══════════════════════════════════════
async function sendRepUpdate() {
    try {
        await fetch(API + '/api/session/rep', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: sid, reps: repCount, exercise: ex })
        });
    } catch (e) {}
}

async function sendGoodRep() {
    try {
        await fetch(API + '/api/session/rep', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: sid, reps: repCount, exercise: ex,
                feedback: { text: 'Good rep! 💪', score: 'good' } })
        });
    } catch (e) {}
}

async function sendKeypointAnalysis(keypointData) {
    if (bedrockBusy) return;
    bedrockBusy = true;
    try {
        const r = await fetch(API + '/api/session/analyze', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: sid, keypoints: keypointData })
        });
        const d = await r.json();
        showFB(d.feedback, d.score);
        updScore(d.score);
    } catch (e) {}
    bedrockBusy = false;
}

// ══════════════════════════════════════
// EXERCISE PICKER
// ══════════════════════════════════════
function pickEx(el) {
    document.querySelectorAll('.ex').forEach(b => b.classList.remove('sel'));
    el.classList.add('sel'); ex = el.dataset.e;
}

// ══════════════════════════════════════
// WORKOUT TOGGLE
// ══════════════════════════════════════
async function toggle() {
    const btn = document.getElementById('actBtn');
    if (!on) {
        await fetch(API + '/api/session/start', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: sid, exercise: ex })
        });
        on = true; repCount = 0; repPhase = 'up';
        repData = { snapshots: [], issues: [], hadBadForm: false };
        angleHistory = []; failedRepCooldown = 0; lastFormCheckTime = 0;
        document.getElementById('reps').textContent = '0';
        btn.textContent = 'Stop Workout'; btn.className = 'act stop';
        t0 = Date.now(); tmInt = setInterval(updTimer, 1000);
        document.getElementById('silOverlay').style.display = 'none';
    } else {
        await fetch(API + '/api/session/stop', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: sid })
        });
        on = false; btn.textContent = 'Start Workout'; btn.className = 'act go';
        clearInterval(tmInt);
        silLockStart = 0; autoStarting = false;
        document.getElementById('toast').classList.remove('vis');
        document.getElementById('angleBadge').style.display = 'none';
    }
}

// ══════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════
function showFB(text, sc) {
    const t = document.getElementById('toast');
    document.getElementById('toastT').textContent = text;
    document.getElementById('toastM').textContent = ex.toUpperCase() + ' · Rep ' + repCount;
    t.classList.add('vis');
    setTimeout(() => t.classList.remove('vis'), 3500);
}

function updScore(sc) {
    const el = document.getElementById('score');
    const m = { good: '✓', warning: '~', bad: '✗' };
    const c = { good: 'var(--g)', warning: 'var(--y)', bad: 'var(--r)' };
    el.textContent = m[sc] || '—'; el.style.color = c[sc] || 'var(--tx)';
}

function updTimer() {
    const s = Math.floor((Date.now() - t0) / 1000), m = Math.floor(s / 60);
    document.getElementById('timer').textContent = m + ':' + String(s % 60).padStart(2, '0');
}
