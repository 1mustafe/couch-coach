<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CouchCoach - Mobile Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Montserrat', 'sans-serif'] }, colors: { app: { bg: '#080f14', surface: '#101f27', border: '#1a2e3a', cyan: '#42d5e6' } } } }
        }
    </script>
</head>
<body class="bg-app-bg text-white font-sans h-screen flex flex-col items-center justify-center p-6 overflow-hidden relative">
    
    <!-- State 1: Enter PIN -->
    <div id="sync-view" class="w-full max-w-sm flex flex-col items-center transition-opacity duration-500 z-10">
        <div class="mb-10 flex flex-col items-center">
            <span class="font-display font-black text-3xl tracking-tighter flex flex-col items-center leading-[0.9]">
                <span>Couch</span><span class="text-app-cyan">Coach</span>
            </span>
            <span class="text-app-cyan font-bold tracking-widest text-[10px] uppercase mt-2 border border-app-cyan/30 px-3 py-1 rounded-full">Mobile Sync</span>
        </div>

        <h1 class="font-display text-3xl font-black mb-2 text-center">Connect Camera</h1>
        <p class="text-slate-400 text-center text-sm mb-8">Enter the 6-character PIN displayed on your TV screen.</p>

        <input type="text" id="pin-input" maxlength="6" placeholder="------" class="bg-app-surface border-2 border-app-border text-white text-center font-display font-black text-4xl tracking-[0.5em] rounded-2xl w-full py-6 focus:outline-none focus:border-app-cyan uppercase transition-colors mb-6 shadow-inner">
        
        <button onclick="syncToTV()" id="sync-btn" class="bg-app-cyan text-slate-900 w-full py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 hover:bg-white transition-colors active:scale-95 shadow-[0_0_20px_rgba(66,213,230,0.2)]">
            <i data-lucide="cast" class="w-5 h-5"></i> Sync with TV
        </button>
    </div>

    <!-- State 2: Camera Active -->
    <div id="active-view" class="hidden absolute inset-0 w-full h-full flex-col items-center text-center bg-black">
        <video id="phone-camera" autoplay playsinline muted class="w-full h-full object-cover transform scale-x-[-1]"></video>
        <canvas id="poseCanvas" class="absolute inset-0 w-full h-full" style="transform: scaleX(-1); pointer-events: none;"></canvas>
        
        <div id="sync-status-bar" class="absolute bottom-12 bg-app-surface/80 backdrop-blur-xl px-8 py-4 rounded-full border border-app-cyan/50 flex items-center gap-4 shadow-2xl">
            <div id="sync-dot" class="w-3 h-3 bg-amber-400 rounded-full animate-pulse shadow-[0_0_10px_rgba(251,191,36,0.8)]"></div>
            <span id="sync-bar-text" class="font-bold tracking-widest uppercase text-sm text-amber-400">Connecting to TV...</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, updateDoc, collection, addDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAYhPAn11OkDpfzUrPgWgV9r47qJU6721M",
            authDomain: "couchcoachhackathon.firebaseapp.com",
            projectId: "couchcoachhackathon",
            storageBucket: "couchcoachhackathon.firebasestorage.app",
            messagingSenderId: "407445984088",
            appId: "1:407445984088:web:7bfc1cc7e6905bc94e8b2d",
            measurementId: "G-F1JP8W3Y7T"
        };

        const appId = 'couchcoachhackathon';
        
        let app, auth, db;
        if (Object.keys(firebaseConfig).length > 0) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            signInAnonymously(auth);
        }

        lucide.createIcons();

        document.getElementById('pin-input').addEventListener('input', function(e) {
            this.value = this.value.toUpperCase();
        });

        const rtcConfig = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ]
        };

        function updateSyncStatus(text, color) {
            const dot = document.getElementById('sync-dot');
            const label = document.getElementById('sync-bar-text');
            const bar = document.getElementById('sync-status-bar');
            label.innerText = text;
            label.className = `font-bold tracking-widest uppercase text-sm text-${color}`;
            dot.className = `w-3 h-3 bg-${color} rounded-full animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.8)]`;
            if (color === 'red-500') {
                bar.className = 'absolute bottom-12 bg-app-surface/80 backdrop-blur-xl px-8 py-4 rounded-full border border-red-500/50 flex items-center gap-4 shadow-2xl';
            } else if (color === 'green-400') {
                bar.className = 'absolute bottom-12 bg-app-surface/80 backdrop-blur-xl px-8 py-4 rounded-full border border-green-400/50 flex items-center gap-4 shadow-2xl';
            } else {
                bar.className = 'absolute bottom-12 bg-app-surface/80 backdrop-blur-xl px-8 py-4 rounded-full border border-app-cyan/50 flex items-center gap-4 shadow-2xl';
            }
        }

        window.syncToTV = async function() {
            const pin = document.getElementById('pin-input').value.trim();
            if(pin.length !== 6) return alert("Please enter a 6 character PIN");

            if (!db || !auth.currentUser) {
                alert("Firebase not configured properly. Waiting for auth...");
                return;
            }

            const btn = document.getElementById('sync-btn');
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Establishing Link...`;
            lucide.createIcons();

            try {
                // Verify the session exists before starting camera
                const sessionRef = doc(db, 'artifacts', appId, 'public', 'data', 'sessions', pin);
                const sessionSnap = await getDoc(sessionRef);
                
                if (!sessionSnap.exists()) {
                    alert("Invalid PIN. No active session found. Check the code on your TV.");
                    btn.innerHTML = `<i data-lucide="cast" class="w-5 h-5"></i> Sync with TV`;
                    lucide.createIcons();
                    return;
                }

                // Start the phone's camera
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                document.getElementById('phone-camera').srcObject = stream;

                // Switch to camera view
                document.getElementById('sync-view').classList.add('hidden');
                document.getElementById('active-view').classList.remove('hidden');
                document.getElementById('active-view').classList.add('flex');
                updateSyncStatus('Connecting to TV...', 'amber-400');

                // Setup WebRTC
                const pc = new RTCPeerConnection(rtcConfig);
                
                // Add camera tracks to the connection
                stream.getTracks().forEach(track => {
                    pc.addTrack(track, stream);
                    console.log("Phone: Added track:", track.kind);
                });

                // Monitor connection state
                pc.onconnectionstatechange = () => {
                    console.log("Phone: Connection state:", pc.connectionState);
                    if (pc.connectionState === 'connected') {
                        updateSyncStatus('Live Syncing to TV', 'green-400');
                    } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                        updateSyncStatus('Connection Lost', 'red-500');
                    }
                };

                pc.oniceconnectionstatechange = () => {
                    console.log("Phone: ICE state:", pc.iceConnectionState);
                };

                const callerCandidatesCollection = collection(sessionRef, 'callerCandidates');

                // Collect ICE candidates
                const pendingCandidates = [];
                let iceDone = false;

                pc.onicecandidate = event => {
                    if (event.candidate) {
                        console.log("Phone: ICE candidate generated");
                        addDoc(callerCandidatesCollection, event.candidate.toJSON());
                    } else {
                        console.log("Phone: All ICE candidates gathered");
                        iceDone = true;
                    }
                };

                // Create offer
                const offerDescription = await pc.createOffer();
                await pc.setLocalDescription(offerDescription);
                console.log("Phone: Offer created and set as local description");

                const offer = {
                    sdp: offerDescription.sdp,
                    type: offerDescription.type,
                };

                // Write offer to Firestore — this triggers the TV to respond
                await updateDoc(sessionRef, { offer, status: 'connected' });
                console.log("Phone: Offer written to Firestore");

                // Listen for the TV's answer
                const answerUnsub = onSnapshot(sessionRef, (snapshot) => {
                    const data = snapshot.data();
                    if (data && data.answer && !pc.currentRemoteDescription) {
                        console.log("Phone: Received TV answer");
                        pc.setRemoteDescription(new RTCSessionDescription(data.answer))
                            .then(() => console.log("Phone: Remote description set successfully"))
                            .catch(e => console.error("Phone: Error setting remote description:", e));
                    }
                });

                // Listen for the TV's ICE candidates
                const calleeCandidatesCollection = collection(sessionRef, 'calleeCandidates');
                const candidateUnsub = onSnapshot(calleeCandidatesCollection, (snapshot) => {
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === 'added') {
                            const data = change.doc.data();
                            console.log("Phone: Received TV ICE candidate");
                            pc.addIceCandidate(new RTCIceCandidate(data))
                                .catch(e => console.error("Phone: Error adding ICE candidate:", e));
                        }
                    });
                });

            } catch(e) {
                console.error("Sync error:", e);
                alert("Failed to sync camera. Ensure camera permissions are granted and the PIN is correct.");
                btn.innerHTML = `<i data-lucide="cast" class="w-5 h-5"></i> Sync with TV`;
                lucide.createIcons();
                // Reset views if we switched
                document.getElementById('active-view').classList.add('hidden');
                document.getElementById('active-view').classList.remove('flex');
                document.getElementById('sync-view').classList.remove('hidden');
            }
        }
    </script>

    <!-- Pose Tracking + Rep Counting + Bedrock Analysis -->
    <script>
        const CC_API = location.origin;
        let poseDetector = null;
        let exercise = 'pushup', repCount = 0, repPhase = 'up';
        let bedrockBusy = false, repData = { snapshots: [], issues: [], hadBadForm: false };
        let lastFormCheckTime = 0, angleHistory = [], failedRepCooldown = 0;
        let silLockStart = 0, autoStarted = false;

        const KP = { NOSE:0,L_EYE:1,R_EYE:2,L_EAR:3,R_EAR:4,L_SHOULDER:5,R_SHOULDER:6,L_ELBOW:7,R_ELBOW:8,L_WRIST:9,R_WRIST:10,L_HIP:11,R_HIP:12,L_KNEE:13,R_KNEE:14,L_ANKLE:15,R_ANKLE:16 };
        const SKELETON = [[5,6],[5,7],[7,9],[6,8],[8,10],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]];

        const EX_CONFIG = {
            pushup: { joint:'l_elbow', down:100, up:150,
                posValid: p => p.l_shoulder_y && p.l_hip_y ? Math.abs(p.l_shoulder_y-p.l_hip_y)<0.25 : true,
                checks: (a,p) => { const i=[]; if(a.l_hip!==null&&a.l_hip<150)i.push('hip_sag'); if(a.l_shoulder!==null&&a.l_shoulder>80)i.push('elbows_flaring'); return i; },
                badge: a => ({val:a.l_elbow,label:'Elbow'})
            },
            squat: { joint:'l_knee', down:100, up:155,
                posValid: p => p.l_shoulder_y && p.l_hip_y ? p.l_shoulder_y<p.l_hip_y : true,
                checks: (a,p) => { const i=[]; if(a.l_hip!==null&&a.l_knee!==null&&a.l_hip<60&&a.l_knee<110)i.push('forward_lean'); if(p.l_knee_x&&p.r_knee_x&&p.l_hip_x&&p.r_hip_x&&Math.abs(p.l_knee_x-p.r_knee_x)<Math.abs(p.l_hip_x-p.r_hip_x)*0.7)i.push('knees_caving'); return i; },
                badge: a => ({val:a.l_knee,label:'Knee'})
            },
            lunge: { joint:'l_knee', down:100, up:155,
                posValid: p => p.l_shoulder_y && p.l_hip_y ? p.l_shoulder_y<p.l_hip_y : true,
                checks: (a,p) => { const i=[]; if(a.l_hip!==null&&a.l_hip<70)i.push('torso_lean'); return i; },
                badge: a => ({val:a.l_knee,label:'Knee'})
            },
            plank: { joint:null, down:0, up:0,
                posValid: p => p.l_shoulder_y && p.l_hip_y ? Math.abs(p.l_shoulder_y-p.l_hip_y)<0.25 : true,
                checks: (a,p) => { const i=[]; if(a.l_hip!==null&&a.l_hip<150)i.push('hip_sag'); if(a.l_hip!==null&&a.l_hip>190)i.push('hip_pike'); return i; },
                badge: a => ({val:a.l_hip,label:'Hip'})
            }
        };

        function angle(a,b,c){ const r=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x); let d=Math.abs(r*180/Math.PI); if(d>180)d=360-d; return d; }
        function safeAngle(a,b,c){ if(!a||!b||!c||a.score<0.3||b.score<0.3||c.score<0.3)return null; return Math.round(angle(a,b,c)); }
        function computeAngles(kps){ return { l_elbow:safeAngle(kps[5],kps[7],kps[9]), r_elbow:safeAngle(kps[6],kps[8],kps[10]), l_shoulder:safeAngle(kps[11],kps[5],kps[7]), r_shoulder:safeAngle(kps[12],kps[6],kps[8]), l_hip:safeAngle(kps[5],kps[11],kps[13]), r_hip:safeAngle(kps[6],kps[12],kps[14]), l_knee:safeAngle(kps[11],kps[13],kps[15]), r_knee:safeAngle(kps[12],kps[14],kps[16]) }; }
        function computePos(kps,w,h){ const p={}; const m={l_knee_x:[13,'x'],r_knee_x:[14,'x'],l_hip_x:[11,'x'],r_hip_x:[12,'x'],l_hip_y:[11,'y'],r_hip_y:[12,'y'],l_shoulder_y:[5,'y'],r_shoulder_y:[6,'y']}; for(const[k,[i,ax]]of Object.entries(m)){if(kps[i].score>0.3)p[k]=kps[i][ax]/(ax==='x'?w:h);} return p; }

        function drawPose(ctx,kps){
            ctx.lineWidth=3;
            for(const[i,j]of SKELETON){ const a=kps[i],b=kps[j]; if(a.score<0.3||b.score<0.3)continue; ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle='rgba(66,213,230,0.5)';ctx.stroke(); }
            for(const kp of kps){ if(kp.score<0.3)continue; ctx.beginPath();ctx.arc(kp.x,kp.y,5,0,2*Math.PI);ctx.fillStyle=kp.score>0.5?'#42d5e6':'#facc15';ctx.fill(); ctx.beginPath();ctx.arc(kp.x,kp.y,8,0,2*Math.PI);ctx.strokeStyle=kp.score>0.5?'rgba(66,213,230,0.3)':'rgba(250,204,21,0.3)';ctx.lineWidth=2;ctx.stroke(); }
        }

        function processRep(kps,w,h){
            const cfg=EX_CONFIG[exercise]; const now=Date.now();
            const angles=computeAngles(kps); const positions=computePos(kps,w,h);
            if(exercise==='plank'){ if(now-lastFormCheckTime>1500){lastFormCheckTime=now; const issues=cfg.checks(angles,positions); if(issues.length>0)sendAnalysis({exercise,phase:'hold',issues});} return; }
            const ta=angles[cfg.joint]; if(ta===null)return;
            if(cfg.posValid&&!cfg.posValid(positions))return;
            angleHistory.push({angle:ta,time:now}); if(angleHistory.length>60)angleHistory.shift();
            if(now-lastFormCheckTime>300){lastFormCheckTime=now; const issues=cfg.checks(angles,positions); if(issues.length>0){repData.hadBadForm=true;repData.issues.push(...issues);}}
            if(repPhase==='up'&&ta<cfg.down){repPhase='down';}
            else if(repPhase==='down'&&ta>cfg.up){repPhase='up';repCount++;sendRep();
                if(repData.hadBadForm){sendAnalysis({rep:repCount,exercise,issues_detected:[...new Set(repData.issues)]});}else{sendRep({text:'Good rep!',score:'good'});}
                repData={snapshots:[],issues:[],hadBadForm:false};
            }
            if(repPhase==='up'&&now-failedRepCooldown>3000&&angleHistory.length>15){
                const recent=angleHistory.slice(-15).map(a=>a.angle);const mn=Math.min(...recent);const cur=recent[recent.length-1];const st=recent[0];
                if(st>cfg.up-10&&mn>cfg.down&&mn<cfg.down+30&&cur>mn+15){failedRepCooldown=now;angleHistory=[];sendAnalysis({exercise,phase:'failed_rep',min_angle:Math.round(mn),threshold:cfg.down,issues:['insufficient_depth']});repData={snapshots:[],issues:[],hadBadForm:false};}
            }
        }

        async function sendRep(feedback){
            try{await fetch(CC_API+'/api/session/rep',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:'phone',reps:repCount,exercise,feedback:feedback||undefined})});}catch(e){}
        }
        async function sendAnalysis(data){
            if(bedrockBusy)return;bedrockBusy=true;
            try{await fetch(CC_API+'/api/session/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:'phone',keypoints:data})});}catch(e){}
            bedrockBusy=false;
        }

        async function initPoseDetection(){
            try{
                await tf.setBackend('webgl');await tf.ready();
                poseDetector=await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet,{modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING});
                console.log('Pose model loaded');
                runPoseLoop();
            }catch(e){console.error('Pose model failed:',e);}
        }

        async function runPoseLoop(){
            const vid=document.getElementById('phone-camera');
            const canvas=document.getElementById('poseCanvas');
            const ctx=canvas.getContext('2d');
            canvas.width=vid.videoWidth||640;canvas.height=vid.videoHeight||480;
            if(poseDetector&&vid.readyState>=2){
                try{
                    const poses=await poseDetector.estimatePoses(vid);
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    if(poses.length>0&&poses[0].keypoints){
                        const kps=poses[0].keypoints;
                        drawPose(ctx,kps);
                        processRep(kps,canvas.width,canvas.height);
                    }
                }catch(e){}
            }
            requestAnimationFrame(runPoseLoop);
        }

        // Start pose detection when camera becomes active
        const camObserver=new MutationObserver(()=>{
            const av=document.getElementById('active-view');
            if(av&&!av.classList.contains('hidden')&&!poseDetector){
                setTimeout(initPoseDetection,1000);
            }
        });
        camObserver.observe(document.getElementById('active-view'),{attributes:true,attributeFilter:['class']});
    </script>
</body>
</html>
